# Default this crate to the bare-metal target when built from within `hv-metal/`. (`cargo xtask
# qemu`, which builds from the repo root via `--manifest-path`, passes `--target` explicitly, and
# the linker script is wired in `build.rs` so it applies regardless of the working directory.)
[build]
target = "aarch64-unknown-none-softfloat"

# The heavy verification the per-push CI deliberately skips, run on a schedule (and on
# demand). Two things the fast lane cannot afford every push:
#   - the exhaustive enumerator's deep sweeps (`#[ignore]`d, millions of reachable states,
#     GBs of RAM) — the bounded-model-checking theorems that are the project's whole point;
#   - a bounded run of every libFuzzer target.
# A red run here means a reachable state violated an invariant, or a fuzzer found a crash —
# either is a real defect, so this workflow is allowed to fail loudly.
name: Deep verification

on:
  schedule:
    # Weekly, Monday 06:17 UTC (offset minute to dodge the top-of-hour scheduler surge).
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: deep-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Every `#[ignore]`d exhaustive sweep, in release, serialized (`--test-threads=1`) because
  # each peaks at several GB and running them in parallel would OOM a 16 GB runner. Each sweep
  # reports whether it CLOSED (a complete theorem for its depth) or hit its state cap (a still-
  # clean lower bound) — see hv-sim/src/enumerate.rs.
  exhaustive-sweeps:
    name: exhaustive enumerator sweeps
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo test --release --ignored (deep sweeps)
        run: cargo test --release -p hv-sim -- --ignored --nocapture --test-threads=1

  # A bounded run of every fuzz target on nightly. No persisted corpus yet, so this is a
  # continuous smoke-fuzz (regression catcher), not a deep campaign — still far better than
  # the targets only ever being compile-checked.
  fuzz:
    name: fuzz (persisted corpus)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: hv-fuzz

      # Persist the coverage corpus across runs — the point of a fuzzing *campaign* vs a
      # from-scratch smoke test. The key is unique per run (so the post-job save always writes
      # a fresh entry), and `restore-keys` pulls the most recent prior corpus, so each weekly
      # run builds on every earlier run's coverage instead of restarting from zero. cargo-fuzz
      # keeps the corpus at `hv-fuzz/corpus/<target>` (the `--fuzz-dir` root).
      - name: Restore the fuzzing corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: hv-fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-

      # Two layout/toolchain notes baked into the invocation:
      #  - hv-fuzz is a *flattened* cargo-fuzz project (it IS the fuzz crate, not the
      #    conventional `<crate>/fuzz/` nested layout), so point cargo-fuzz at it with
      #    `--fuzz-dir hv-fuzz` from the repo root rather than the `./fuzz` default; and
      #  - cargo-fuzz defaults to the musl (statically-linked libc) target on Linux, which
      #    AddressSanitizer cannot instrument ("sanitizer is incompatible with statically
      #    linked libc"), so force the gnu target (dynamic libc, the runner's host std).
      # Each target runs 180s, then `cmin` minimizes its corpus so coverage accumulates
      # without unbounded growth in the cache.
      - name: fuzz each target (build on the persisted corpus)
        run: |
          set -euo pipefail
          for target in decode evtchn grant sched policy hypervisor p2m; do
            echo "::group::fuzz $target"
            cargo fuzz run --fuzz-dir hv-fuzz --target x86_64-unknown-linux-gnu \
              "$target" -- -max_total_time=180 -rss_limit_mb=4096
            cargo fuzz cmin --fuzz-dir hv-fuzz --target x86_64-unknown-linux-gnu "$target"
            echo "::endgroup::"
          done

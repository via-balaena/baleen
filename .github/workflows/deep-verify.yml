# The heavy verification the per-push CI deliberately skips, run on a schedule (and on
# demand). Three things the fast lane cannot afford every push:
#   - the exhaustive enumerator's deep sweeps (`#[ignore]`d, millions of reachable states,
#     GBs of RAM) — the bounded-model-checking theorems that are the project's whole point;
#   - a bounded run of every libFuzzer target;
#   - the Tier C Kani preservation proofs (hv-verify) — which, unlike the enumerator, prove
#     invariant preservation over UNBOUNDED refcount magnitudes (installing Kani + its CBMC
#     backend costs a few minutes, so it belongs here, not in the per-PR gate);
#   - the Tier C Verus preservation proofs (hv-verify/verus) — the ∀-N step: preservation over
#     ARBITRARY table size (the scalar↔Vec length axis Kani can only `unwind`).
# A red run here means a reachable state violated an invariant, a fuzzer found a crash, or a
# transition can break an invariant at some refcount or table size — each is a real defect, so
# this workflow is allowed to fail loudly.
name: Deep verification

on:
  schedule:
    # Weekly, Monday 06:17 UTC (offset minute to dodge the top-of-hour scheduler surge).
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: deep-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Every `#[ignore]`d exhaustive sweep, in release, serialized (`--test-threads=1`) because
  # each peaks at several GB and running them in parallel would OOM a 16 GB runner. Each sweep
  # reports whether it CLOSED (a complete theorem for its depth) or hit its state cap (a still-
  # clean lower bound) — see hv-sim/src/enumerate.rs.
  exhaustive-sweeps:
    name: exhaustive enumerator sweeps
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo test --release --ignored (deep sweeps)
        run: cargo test --release -p hv-sim -- --ignored --nocapture --test-threads=1

  # Tier C: the Kani preservation proofs in hv-verify. Each proof makes a grant refcount
  # fully symbolic and proves an invariant (`WritableExceedsMaps`) survives a transition for
  # EVERY 2^32 magnitude — the residual Tier B (docs/TIER-B-CUTOFF.md §1.4) could only argue,
  # since an infinite state space cannot be enumerated. The harnesses are `#[cfg(kani)]`-gated,
  # so they exist only under `cargo kani`; a normal build never sees them.
  kani:
    name: kani preservation proofs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # Kani is a cargo subcommand plus its own downloaded backend (CBMC). The version is
      # pinned so a Kani release cannot silently change proof semantics — raise it deliberately
      # (mirrors the cargo-deny @0.19.0 pin). `cargo kani setup` fetches the backend once.
      - name: Install Kani
        run: |
          cargo install --locked kani-verifier@0.67.0
          cargo kani setup

      - name: cargo kani -p hv-verify (preservation proofs)
        run: cargo kani -p hv-verify

  # Tier C, the ∀-N step: the Verus preservation proofs in hv-verify/verus. Where Kani makes a
  # refcount symbolic and proves over all 2^32 MAGNITUDES on the real code (bounded on Vec
  # length), Verus proves `RefcountMismatch` preserved by grant map/unmap over an ARBITRARY
  # entry table and ARBITRARY-length mapping sequence — the scalar↔Vec-length axis Kani would
  # have to `unwind` (docs/TIER-B-CUTOFF.md §3(1), docs/TIER-C-SPIKE.md). The proofs are a Verus-
  # dialect MIRROR (Verus cannot be #[cfg]-hidden from cargo like the Kani harnesses can), kept
  # outside hv-verify/src so a normal build never sees them; fidelity to the shipped transition
  # is documented in hv-verify/verus/README.md. Verus ships prebuilt (verifier + z3) but drives
  # the pinned rustup toolchain it was built against (installed below); the release is
  # version-pinned so a Verus release cannot silently change proof semantics (mirrors the Kani /
  # cargo-deny pins).
  verus:
    name: verus preservation proofs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Pinned Verus release. Raise deliberately with a local re-verify, not via Dependabot
      # (Dependabot does not track GitHub-release downloads). Keep in step with the
      # arm64-macos asset documented in hv-verify/verus/README.md.
      VERUS_TAG: release/0.2026.07.12.0b42f4c
      VERUS_ZIP: verus-0.2026.07.12.0b42f4c-x86-linux.zip
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Verus's prebuilt driver shells out to rustup for the EXACT toolchain it was built
      # against (1.96.0 for this release) and errors if it is not installed. Conveniently that
      # is our MSRV floor — so, unlike Kani (whose pinned 1.93 nightly sits *below* the floor and
      # forced dropping the manifest gate, see Cargo.toml), Verus's pin is benign: it needs no
      # manifest change, just the floor toolchain present via rustup.
      - name: Install the Verus toolchain (1.96.0 — the MSRV floor)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: 1.96.0

      # Verus is a self-contained prebuilt bundle (verifier + z3); it uses the rustup toolchain
      # installed above for its front-end.
      - name: Install Verus (pinned prebuilt)
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/verus.zip \
            "https://github.com/verus-lang/verus/releases/download/${VERUS_TAG}/${VERUS_ZIP}"
          mkdir -p "$HOME/.local/verus"
          unzip -q /tmp/verus.zip -d "$HOME/.local/verus"
          echo "$HOME/.local/verus/verus-x86-linux" >> "$GITHUB_PATH"

      - name: verus --crate-type=lib (RefcountMismatch preservation, ∀ table size)
        run: verus --crate-type=lib hv-verify/verus/refcount_mismatch.rs

  # A bounded run of every fuzz target on nightly. No persisted corpus yet, so this is a
  # continuous smoke-fuzz (regression catcher), not a deep campaign — still far better than
  # the targets only ever being compile-checked.
  fuzz:
    name: fuzz (persisted corpus)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: hv-fuzz

      # Persist the coverage corpus across runs — the point of a fuzzing *campaign* vs a
      # from-scratch smoke test. The key is unique per run (so the post-job save always writes
      # a fresh entry), and `restore-keys` pulls the most recent prior corpus, so each weekly
      # run builds on every earlier run's coverage instead of restarting from zero. cargo-fuzz
      # keeps the corpus at `hv-fuzz/corpus/<target>` (the `--fuzz-dir` root).
      - name: Restore the fuzzing corpus
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: hv-fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: |
            fuzz-corpus-

      # Two layout/toolchain notes baked into the invocation:
      #  - hv-fuzz is a *flattened* cargo-fuzz project (it IS the fuzz crate, not the
      #    conventional `<crate>/fuzz/` nested layout), so point cargo-fuzz at it with
      #    `--fuzz-dir hv-fuzz` from the repo root rather than the `./fuzz` default; and
      #  - cargo-fuzz defaults to the musl (statically-linked libc) target on Linux, which
      #    AddressSanitizer cannot instrument ("sanitizer is incompatible with statically
      #    linked libc"), so force the gnu target (dynamic libc, the runner's host std).
      # Each target runs 180s, then `cmin` minimizes its corpus so coverage accumulates
      # without unbounded growth in the cache.
      - name: fuzz each target (build on the persisted corpus)
        run: |
          set -euo pipefail
          for target in decode evtchn grant sched policy hypervisor p2m; do
            echo "::group::fuzz $target"
            cargo fuzz run --fuzz-dir hv-fuzz --target x86_64-unknown-linux-gnu \
              "$target" -- -max_total_time=180 -rss_limit_mb=4096
            cargo fuzz cmin --fuzz-dir hv-fuzz --target x86_64-unknown-linux-gnu "$target"
            echo "::endgroup::"
          done

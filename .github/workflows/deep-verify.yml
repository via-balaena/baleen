# The heavy verification the per-push CI deliberately skips, run on a schedule (and on
# demand). Two things the fast lane cannot afford every push:
#   - the exhaustive enumerator's deep sweeps (`#[ignore]`d, millions of reachable states,
#     GBs of RAM) — the bounded-model-checking theorems that are the project's whole point;
#   - a bounded run of every libFuzzer target.
# A red run here means a reachable state violated an invariant, or a fuzzer found a crash —
# either is a real defect, so this workflow is allowed to fail loudly.
name: Deep verification

on:
  schedule:
    # Weekly, Monday 06:17 UTC (offset minute to dodge the top-of-hour scheduler surge).
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: deep-verify-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Every `#[ignore]`d exhaustive sweep, in release, serialized (`--test-threads=1`) because
  # each peaks at several GB and running them in parallel would OOM a 16 GB runner. Each sweep
  # reports whether it CLOSED (a complete theorem for its depth) or hit its state cap (a still-
  # clean lower bound) — see hv-sim/src/enumerate.rs.
  exhaustive-sweeps:
    name: exhaustive enumerator sweeps
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: cargo test --release --ignored (deep sweeps)
        run: cargo test --release -p hv-sim -- --ignored --nocapture --test-threads=1

  # A bounded run of every fuzz target on nightly. No persisted corpus yet, so this is a
  # continuous smoke-fuzz (regression catcher), not a deep campaign — still far better than
  # the targets only ever being compile-checked.
  fuzz:
    name: bounded fuzz run
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-fuzz

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: hv-fuzz

      - name: fuzz each target for 60s
        working-directory: hv-fuzz
        run: |
          set -euo pipefail
          for target in decode evtchn grant sched policy hypervisor p2m; do
            echo "::group::fuzz $target"
            cargo fuzz run "$target" -- -max_total_time=60 -rss_limit_mb=4096
            echo "::endgroup::"
          done

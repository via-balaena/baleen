name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job here only reads the checkout. No job writes contents,
# issues, packages, or deployments, so a compromised action or dependency cannot use
# the workflow token to mutate the repo. Any future job needing more elevates itself.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Third-party actions are pinned to a full commit SHA (the tag in the comment is for
# humans and for Dependabot, which bumps the SHA via reviewed PRs — see
# .github/dependabot.yml). A moved tag cannot silently change what runs in CI.
#
# Every job starts with step-security/harden-runner in `audit` mode: it monitors and logs
# the runner's network egress (so a compromised action phoning home is visible in the run's
# security insights) without blocking anything — a mis-scoped allow-list therefore cannot
# redden CI. Once the observed egress is known, this can be tightened to `egress-policy: block`
# with an explicit `allowed-endpoints` list. Pairs with the SHA-pinning: pinning fixes *what*
# runs, harden-runner watches *what it talks to*.
jobs:
  ci:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # The single source of truth for "green": the same bar `cargo xtask ci`
      # enforces locally — rustfmt --check, clippy -D warnings, then the tests.
      - name: cargo xtask ci
        run: cargo xtask ci

  # Compile-check the standalone fuzz crate so a broken target is caught in CI,
  # without spending wall-clock actually fuzzing on every push (the scheduled
  # deep-verify workflow runs the fuzzers).
  fuzz-build:
    name: fuzz targets build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: hv-fuzz

      - name: cargo check (hv-fuzz)
        working-directory: hv-fuzz
        run: cargo check --all-targets

  # Supply-chain gate: refuse a dependency carrying a security advisory, a disallowed
  # license, an untrusted source, or a wildcard version. The shipping workspace has zero
  # external deps today, so this stays green now and blocks the first bad dep from landing
  # unreviewed. cargo-deny's advisory check subsumes cargo-audit (same RustSec database).
  # Covers both manifests: the workspace AND the standalone hv-fuzz crate (where the only
  # real third-party code — libFuzzer and its deps — actually lives).
  supply-chain:
    name: supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          # Pin the tool version so CI matches what is validated locally; a CLI change in a
          # newer cargo-deny cannot silently break this job. Dependabot does not bump this
          # (it is a tool, not a dependency) — raise it deliberately alongside a local re-check.
          tool: cargo-deny@0.19.0

      - name: cargo-deny (workspace)
        run: cargo deny check

      - name: cargo-deny (hv-fuzz)
        working-directory: hv-fuzz
        run: cargo deny check --config ../deny.toml

  # Enforce the declared MSRV (`rust-version` in the workspace manifest): the code must
  # compile on the floor, so the promise cannot silently rot as newer std APIs tempt their
  # way in. A `check` (not a full test run) is the MSRV contract — the stable `ci` job above
  # already runs the tests.
  msrv:
    name: MSRV (1.96)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned MSRV toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # No `--locked`: Cargo.lock is gitignored (a zero-external-dep library workspace), so
      # there is nothing to lock against — the resolver builds a trivial graph of path crates.
      - name: cargo check on the MSRV floor
        run: cargo check --workspace --all-targets

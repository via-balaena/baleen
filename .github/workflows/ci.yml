name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job here only reads the checkout. No job writes contents,
# issues, packages, or deployments, so a compromised action or dependency cannot use
# the workflow token to mutate the repo. Any future job needing more elevates itself.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

# Third-party actions are pinned to a full commit SHA (the tag in the comment is for
# humans and for Dependabot, which bumps the SHA via reviewed PRs — see
# .github/dependabot.yml). A moved tag cannot silently change what runs in CI.
#
# Every job starts with step-security/harden-runner in `audit` mode: it monitors and logs
# the runner's network egress (so a compromised action phoning home is visible in the run's
# security insights) without blocking anything — a mis-scoped allow-list therefore cannot
# redden CI. Once the observed egress is known, this can be tightened to `egress-policy: block`
# with an explicit `allowed-endpoints` list. Pairs with the SHA-pinning: pinning fixes *what*
# runs, harden-runner watches *what it talks to*.
jobs:
  ci:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # The single source of truth for "green": the same bar `cargo xtask ci`
      # enforces locally — rustfmt --check, clippy -D warnings, then the tests.
      - name: cargo xtask ci
        run: cargo xtask ci

  # Compile-check the standalone fuzz crate so a broken target is caught in CI,
  # without spending wall-clock actually fuzzing on every push (the scheduled
  # deep-verify workflow runs the fuzzers).
  fuzz-build:
    name: fuzz targets build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: nightly

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: hv-fuzz

      - name: cargo check (hv-fuzz)
        working-directory: hv-fuzz
        run: cargo check --all-targets

  # Metal boot smoke-test (M3, Arc 0): build the standalone bare-metal `hv-metal` binary for
  # `aarch64-unknown-none-softfloat` and boot it on the QEMU `virt` machine at EL2, asserting the
  # serial marker `rust_main` prints. This is the metal side of the "diamond -> CI-green -> merge"
  # loop — every later metal arc rides this check. `hv-metal` is excluded from the workspace (it
  # cannot link for the host), so it is built + booted out-of-band via `cargo xtask qemu-test`.
  # Functional refinement only — see docs/QEMU-AND-METAL.md for what an emulated run does and does
  # not attest.
  metal-boot:
    name: metal boot (QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install stable toolchain + bare-metal target
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          targets: aarch64-unknown-none-softfloat

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: hv-metal

      # `qemu-system-arm` provides `qemu-system-aarch64` on Ubuntu.
      - name: Install QEMU (AArch64 system emulation)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends qemu-system-arm

      - name: hv-metal boots to the serial marker under QEMU
        run: cargo xtask qemu-test

  # Supply-chain gate: refuse a dependency carrying a security advisory, a disallowed
  # license, an untrusted source, or a wildcard version. The shipping workspace has zero
  # external deps today, so this stays green now and blocks the first bad dep from landing
  # unreviewed. cargo-deny's advisory check subsumes cargo-audit (same RustSec database).
  # Covers both manifests: the workspace AND the standalone hv-fuzz crate (where the only
  # real third-party code — libFuzzer and its deps — actually lives).
  supply-chain:
    name: supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install cargo-deny
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          # Pin the tool version so CI matches what is validated locally; a CLI change in a
          # newer cargo-deny cannot silently break this job. Dependabot does not bump this
          # (it is a tool, not a dependency) — raise it deliberately alongside a local re-check.
          tool: cargo-deny@0.19.0

      - name: cargo-deny (workspace)
        run: cargo deny check

      - name: cargo-deny (hv-fuzz)
        working-directory: hv-fuzz
        run: cargo deny check --config ../deny.toml

  # Enforce the MSRV: the code must compile on the 1.96 floor, so the promise cannot silently
  # rot as newer std APIs tempt their way in. This job is the *single source* of MSRV
  # enforcement — the workspace manifest deliberately omits the `rust-version` gate so Kani's
  # pinned (older) toolchain can build the libraries for the Tier C proofs (see the note in
  # Cargo.toml). The `1.96` here is therefore the MSRV definition; raise both together. A
  # `check` (not a full test run) is the contract — the stable `ci` job above runs the tests.
  msrv:
    name: MSRV (1.96)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (audit egress)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pinned MSRV toolchain
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: "1.96"

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # No `--locked`: Cargo.lock is gitignored (a zero-external-dep library workspace), so
      # there is nothing to lock against — the resolver builds a trivial graph of path crates.
      - name: cargo check on the MSRV floor
        run: cargo check --workspace --all-targets
